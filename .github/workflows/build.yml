name: Build Dot-to-Dot Book

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest

      - name: Generate sample pages
        run: |
          python -m dot_to_dot.cli process --input input_images --output output

      - name: Build PDF
        run: |
          python -m dot_to_dot.cli build-pdf --pages output/pages --pdf output/final_book.pdf

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: generated-files
          path: output/
